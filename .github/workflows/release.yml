name: Build Windows EXE

on:
  push:
    tags: ["v*"]           # v0.1.1 等のタグを push するとビルド→リリースに添付
  workflow_dispatch: {}     # 手動実行も可(成果物は Artifacts に)

permissions:
  contents: write           # リリースへのアップロードに必要

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps (full)
        run: uv sync --extra full --python 3.12

      - name: Build exe (PyInstaller)
        run: uv run --python 3.12 --with pyinstaller pyinstaller packaging/koerelay.spec

      - name: Zip onedir build
        run: Compress-Archive -Path dist/KoeRelay/* -DestinationPath KoeRelay-windows-x64.zip -Force

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: KoeRelay-windows-x64.zip

      - name: Upload build artifact (manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: KoeRelay-windows-x64
          path: KoeRelay-windows-x64.zip
